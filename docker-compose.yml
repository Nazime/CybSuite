version: "3.8"

services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  frontend:
    build: ./frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "2502:3000"
    environment:
      - VITE_API_URL=http://host.docker.internal:2501
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pg_data:
